data:
  path: plant_health_biosensor_dataset.csv
  random_state: 42
  val_size: 0.2
model:
  activation: relu
  dropout: 0.3
  hidden_layers:
  - 128
  - 64
  - 32
  type: mlp
paths:
  results: results/
  saved_models: saved_models/
preprocessing:
  apply_smote: true
  scaler: standard
training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  patience: 7
  reduce_patience: 5
