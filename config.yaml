data:
  path: "data/plant_health_biosensor_15k.csv"
  test_size: 0.2
  val_size: 0.0
  random_state: 42

preprocessing:
  scaler: "standard"
  apply_smote: true

model:
  type: "mlp"
  hidden_layers: [128, 64, 32]
  dropout: 0.3
  activation: "relu"

training:
  epochs: 120
  batch_size: 32
  learning_rate: 0.0008
  patience: 15
  reduce_patience: 8

paths:
  saved_models: "saved_models/"
  results: "results/"